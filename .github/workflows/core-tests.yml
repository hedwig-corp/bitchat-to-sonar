name: Core tests

# The full Swift/Compose apps can't be built in CI — they link the Rust FFI as a
# gitignored xcframework / .so generated by core/build-{ios,android}.sh and not
# committed. The Rust core (sonar-core + sonar-ffi) is the real testable unit and
# builds/tests cleanly without those artifacts, so CI exercises it.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Rust core tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Update Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Run core tests
        run: cargo test --workspace
        working-directory: core
