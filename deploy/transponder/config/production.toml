[server]
private_key_file = "/run/secrets/server.key"

[relays]
clearnet = [
    "wss://relay.damus.io",
    "wss://nos.lol",
    "wss://nostr.relay.hedwig.sh",
]

[apns]
enabled = true
key_id = "PX84KR34WH"
team_id = "L3N5LHJD5Y"
private_key_path = "/run/secrets/apns.p8"
