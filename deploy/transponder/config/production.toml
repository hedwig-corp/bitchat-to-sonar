# Sonar push notification server (transponder) — PRODUCTION instance.
# https://github.com/marmot-protocol/transponder
#
# This config is Sonar-specific. The server keypair, APNS credentials, and
# FCM credentials must be provisioned separately — see deploy/README.md.
#
# Sonar runs TWO transponder instances (this one + sandbox.toml) that share the
# same server key (npub) and relays. APNs has two separate gateways and a device
# token is bound to one of them (TestFlight/App Store builds = production,
# Xcode/Debug builds = sandbox); a token sent to the wrong gateway is dropped
# with BadDeviceToken. Each instance pushes every request to its own gateway, so
# only the matching one delivers. This (production) instance also owns FCM, so
# Android keeps working even if the sandbox instance is turned off.
# See transponder/APNS-ENVIRONMENTS.md for the full rationale + live state.

[server]
# Path to the secp256k1 private key file (hex-encoded).
# Generate with: transponder generate-keys --output ./secrets/server.key
private_key_file = "/run/secrets/server.key"

[relays]
# Nostr relays the server subscribes to for kind:1059 gift-wrapped notification
# requests. Use the same relays Sonar clients publish to.
clearnet = [
    "wss://relay.damus.io",
    "wss://nos.lol",
    "wss://nostr.relay.hedwig.sh",
]

[apns]
# Apple Push Notification Service credentials for Sonar's iOS bundle ID.
# The .p8 key file, key ID, and team ID come from the Apple Developer portal.
# For killed-app chat/call wakeups, Transponder's iOS payload must be a visible
# notification with mutable-content=1 and a marker the NSE recognizes. Silent
# content-available-only APNS will not relaunch a user-force-quit app.
enabled = true
private_key_path = "/run/secrets/apns.p8"
key_id = "PX84KR34WH"
team_id = "ZQB239SHCM"
bundle_id = "sh.hedwig.sonar"
# "production" matches App Store / TestFlight builds. Debug builds use sandbox
# APNs tokens — use a separate sandbox.toml for dev testing.
environment = "production"
# Upstream Transponder mode that sends alert APNS with mutable-content=1 and
# the wn_nse_prototype marker for the iOS Notification Service Extension.
payload_mode = "nse_prototype_alert"

[fcm]
# Firebase Cloud Messaging credentials for Sonar's Android package.
# The service account JSON comes from the Firebase Console.
# FCM is environment-agnostic (Firebase bridges to APNs and Android), so it is
# enabled on EXACTLY ONE instance — this one. The sandbox instance keeps FCM
# disabled to avoid sending every Android push twice.
enabled = true
service_account_path = "/run/secrets/firebase.json"
project_id = "sonarchat-11566"
